<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morning News Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #eef1f4;
      color: #20252b;
      line-height: 1.55;
    }
    main {
      max-width: 900px;
      margin: auto;
      background: white;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }
    h1 { margin-top: 0; }
    .card {
      border: 1px solid #d4dbe3;
      border-radius: 14px;
      padding: 14px;
      margin: 12px 0;
      background: #fff;
    }
    .tag {
      display: inline-block;
      font-size: .75rem;
      font-weight: 700;
      background: #e7f0fb;
      color: #244f7d;
      border-radius: 999px;
      padding: 3px 8px;
    }
    a { color: #155da8; }
  </style>
</head>
<body>
<main>
  <h1>Morning News Dashboard</h1>
  <p>This is the stable dashboard page for my daily personalized news briefing.</p>

  <section>
    <h2>Today’s Briefing</h2>

    <article class="card">
      <span class="tag">Test</span>
      <h3>Dashboard setup in progress</h3>
      <p>If you can see this page on GitHub Pages, the stable news-dashboard link is working.</p>
    </article>
  </section>
</main>
</body>
</html>
